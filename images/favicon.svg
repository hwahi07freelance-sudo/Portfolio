<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c0e"/>
      <stop offset="1" stop-color="#14161a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>
  <path d="M-10 30 C 30 5, 80 0, 140 18 L 140 -10 L -10 -10 Z" fill="url(#shine)"/>
  <rect x="10" y="10" width="108" height="108" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>

  <g filter="url(#softShadow)">
    <text x="64" y="76"
      text-anchor="middle"
      font-family="Segoe UI, system-ui, -apple-system, Arial, sans-serif"
      font-weight="900"
      font-size="44"
      letter-spacing="1.5"
      fill="#ffffff">HMW7</text>
  </g>
</svg>

